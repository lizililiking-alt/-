<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人灵感画廊</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #FEFDF8; color: #3c4043; }
        .mocha-pink { background-color: #F8CCDB; }
        .mocha-gray { color: #9FA2A6; }
        .font-serif { font-family: 'Noto Serif SC', serif; letter-spacing: 0.05em; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #DFE3E2; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #F8CCDB; }
    </style>
</head>
<body class="flex h-screen overflow-hidden" id="app">

    <aside class="w-64 bg-[#F7F5F0] border-r border-gray-100 flex flex-col p-8 z-10">
        <h1 class="text-3xl font-bold mb-12 text-gray-800">灵感库</h1>
        <div class="text-[10px] tracking-widest mocha-gray mb-6 uppercase">Collection / 分类</div>
        <ul class="space-y-4 flex-1 overflow-y-auto">
            <li v-for="cat in categories" :key="cat.id">
                <a href="#" @click.prevent="currentCategoryId = cat.id" 
                   :class="['block py-1 transition-all border-b-2', currentCategoryId === cat.id ? 'border-[#F8CCDB] text-gray-900 font-bold' : 'border-transparent text-gray-400 hover:text-gray-600']">
                    {{ cat.name }}
                </a>
            </li>
            <li class="pt-6">
                <div v-if="isAddingCategory" class="flex items-center border-b border-[#F8CCDB]">
                    <input v-model="newCategoryName" @keyup.enter="addCategory" placeholder="新分类名称..." class="w-full bg-transparent py-1 text-sm outline-none">
                </div>
                <a v-else href="#" @click.prevent="isAddingCategory = true" class="text-xs text-gray-400 hover:text-[#F8CCDB] transition-colors">+ 添加新分类 / Add</a>
            </li>
        </ul>
    </aside>

    <main class="flex-1 flex flex-col relative bg-white">
        <header class="h-20 px-10 flex justify-between items-center">
            <div class="w-64">
                <input v-model="searchQuery" type="text" placeholder="搜索关键词..." class="w-full bg-gray-50 px-4 py-2 rounded-full text-xs outline-none focus:ring-1 focus:ring-[#F8CCDB]">
            </div>
            <button @click="showUploadModal = true" class="mocha-pink text-gray-700 px-8 py-2 rounded-full hover:shadow-lg transition-all font-bold text-sm">
                导入图像
            </button>
        </header>

        <div class="flex-1 p-10 overflow-y-auto bg-[#FCFAF5]">
            <div v-if="filteredInspirations.length === 0" class="h-full flex flex-col items-center justify-center mocha-gray">
                <p class="text-lg font-serif">暂无数据记录</p>
                <p class="text-[10px] mt-2 tracking-widest">NO ENTRIES FOUND</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
                <div v-for="item in filteredInspirations" :key="item.id" class="group cursor-pointer" @click="viewDetails(item)">
                    <div class="aspect-[4/3] overflow-hidden rounded-lg mb-4 shadow-sm group-hover:shadow-xl transition-all">
                        <img :src="item.image_url" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <h3 class="font-serif font-bold text-gray-800">{{ item.title || '未命名' }}</h3>
                    <p class="text-[10px] mocha-gray mt-1 line-clamp-2">{{ item.prompts }}</p>
                </div>
            </div>
        </div>

        <div v-if="showUploadModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="
