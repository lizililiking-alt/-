<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人灵感画廊</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #FEFDF8; color: #3c4043; }
        .mocha-pink { background-color: #F8CCDB; }
        .mocha-gray { color: #9FA2A6; }
        .mocha-mint { background-color: #DFE3E2; }
        /* 针对宋体优化的大气排版 */
        h1, h2, .font-serif { font-family: 'Noto Serif SC', serif; letter-spacing: 0.05em; }
    </style>
</head>
<body class="flex h-screen overflow-hidden" id="app">

    <aside class="w-64 bg-[#F7F5F0] border-r border-gray-100 flex flex-col p-8 z-10">
        <h1 class="text-3xl font-bold mb-12 text-gray-800">灵感库</h1>
        <div class="text-[10px] tracking-widest mocha-gray mb-6 uppercase">Collection / 分类</div>
        <ul class="space-y-4 flex-1 overflow-y-auto">
            <li v-for="cat in categories" :key="cat.id">
                <a href="#" @click.prevent="currentCategoryId = cat.id" 
                   :class="['block py-1 transition-all border-b-2', currentCategoryId === cat.id ? 'border-[#F8CCDB] text-gray-900 font-bold' : 'border-transparent text-gray-400 hover:text-gray-600']">
                    {{ cat.name }}
                </a>
            </li>
            <li class="pt-6">
                <div v-if="isAddingCategory" class="flex items-center border-b border-[#F8CCDB]">
                    <input v-model="newCategoryName" @keyup.enter="addCategory" placeholder="新分类名称..." class="w-full bg-transparent py-1 text-sm outline-none">
                </div>
                <a v-else href="#" @click.prevent="isAddingCategory = true" class="text-xs text-gray-400 hover:text-[#F8CCDB] transition-colors">+ 添加新分类 / Add</a>
            </li>
        </ul>
    </aside>

    <main class="flex-1 flex flex-col relative bg-white">
        <header class="h-20 px-10 flex justify-between items-center">
            <div class="w-64">
                <input v-model="searchQuery" type="text" placeholder="搜索关键词..." class="w-full bg-gray-50 px-4 py-2 rounded-full text-xs outline-none focus:ring-1 focus:ring-[#F8CCDB]">
            </div>
            <button @click="showUploadModal = true" class="mocha-pink text-gray-700 px-8 py-2 rounded-full hover:shadow-lg transition-all font-bold text-sm">
                导入图像
            </button>
        </header>

        <div class="flex-1 p-10 overflow-y-auto bg-[#FCFAF5]">
            <div v-if="filteredInspirations.length === 0" class="h-full flex flex-col items-center justify-center mocha-gray">
                <p class="text-lg font-serif">暂无数据记录</p>
                <p class="text-[10px] mt-2 tracking-widest">NO ENTRIES FOUND</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
                <div v-for="item in filteredInspirations" :key="item.id" class="group cursor-pointer">
                    <div class="aspect-[4/3] overflow-hidden rounded-lg mb-4 shadow-sm group-hover:shadow-xl transition-all">
                        <img :src="item.image_url" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <h3 class="font-serif font-bold text-gray-800">{{ item.title || '未命名' }}</h3>
                    <p class="text-[10px] mocha-gray mt-1 line-clamp-2">{{ item.prompts }}</p>
                </div>
            </div>
        </div>

        <div v-if="showUploadModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white w-[550px] rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                <div class="flex justify-between items-center px-8 py-6 border-b border-gray-50">
                    <h2 class="text-xl font-serif">新增记录 <span class="text-[10px] mocha-gray ml-2 uppercase font-sans">Add Entry</span></h2>
                    <button @click="closeModal" class="text-gray-300 hover:text-gray-600 text-2xl transition-colors">✕</button>
                </div>
                
                <div class="p-8 space-y-6">
                    <div @click="$refs.fileInput.click()" class="border-2 border-dashed border-[#DFE3E2] bg-[#FEFDF8] h-48 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-[#F8CCDB] transition-colors group">
                        <input type="file" ref="fileInput" @change="handleFileSelect" class="hidden" accept="image/*">
                        <div v-if="!selectedFile" class="text-center">
                            <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">☁️</div>
                            <p class="text-xs mocha-gray">点击上传图片 / Click to upload</p>
                        </div>
                        <div v-else class="text-center px-4">
                            <p class="text-xs text-[#F8CCDB] font-bold truncate">{{ selectedFile.name }}</p>
                            <p class="text-[10px] mocha-gray mt-1">点击可更换图片</p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="border-b border-gray-100 py-1">
                            <label class="text-[10px] mocha-gray block mb-1">标题 TITLE</label>
                            <input v-model="formData.title" type="text" class="w-full outline-none text-sm font-serif">
                        </div>
                        <div class="border-b border-gray-100 py-1">
                            <label class="text-[10px] mocha-gray block mb-1">提示词内容 PROMPTS</label>
                            <textarea v-model="formData.prompts" rows="3" class="w-full outline-none text-sm resize-none"></textarea>
                        </div>
                        <div class="border-b border-gray-100 py-1">
                            <label class="text-[10px] mocha-gray block mb-1">标签 TAGS</label>
                            <input v-model="formData.tags" type="text" placeholder="用逗号分隔..." class="w-full outline-none text-sm">
                        </div>
                    </div>
                </div>

                <div class="px-8 py-6 bg-gray-50 flex justify-end items-center gap-6">
                    <button @click="closeModal" class="text-xs mocha-gray hover:text-gray-800 transition-colors">取消 CANCEL</button>
                    <button @click="uploadAndSave" :disabled="isUploading" class="mocha-pink px-10 py-3 rounded-full text-sm font-bold shadow-md hover:shadow-lg disabled:opacity-50 transition-all">
                        {{ isUploading ? '保存中...' : '保存记录 SAVE' }}
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ================= 🔑 密钥已自动填入 =================
        const SUPABASE_URL = 'https://nmjbxokiljbhmzwpwqxe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1ajuVZe4-fpjmIW_ShceWQ__yVdj6aN';
        const IMGBB_KEY = '445eddb50c646ffdca04c354c185bbc9';
        // ==========================================================

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        Vue.createApp({
            data() {
                return {
                    categories: [],
                    currentCategoryId: null,
                    inspirations: [],
                    isAddingCategory: false,
                    newCategoryName: '',
                    searchQuery: '',
                    showUploadModal: false,
                    selectedFile: null,
                    isUploading: false,
                    formData: { title: '', prompts: '', tags: '' }
                }
            },
            computed: {
                filteredInspirations() {
                    let items = this.inspirations.filter(i => i.category_id === this.currentCategoryId);
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        items = items.filter(i => (i.title && i.title.toLowerCase().includes(q)) || (i.prompts && i.prompts.toLowerCase().includes(q)));
                    }
                    return items;
                }
            },
            async mounted() {
                await this.fetchCategories();
                await this.fetchInspirations();
            },
            methods: {
                async fetchCategories() {
                    const { data } = await supabaseClient.from('categories').select('*').order('id');
                    if (data) {
                        this.categories = data;
                        if (!this.currentCategoryId && data.length > 0) this.currentCategoryId = data[0].id;
                    }
                },
                async fetchInspirations() {
                    const { data } = await supabaseClient.from('inspirations').select('*').order('created_at', { ascending: false });
                    if (data) this.inspirations = data;
                },
                async addCategory() {
                    if (!this.newCategoryName.trim()) return;
                    const { data, error } = await supabaseClient.from('categories').insert([{ name: this.newCategoryName }]).select();
                    if (error) alert("分类添加失败: " + error.message);
                    else {
                        this.categories.push(data[0]);
                        this.newCategoryName = '';
                        this.isAddingCategory = false;
                        this.currentCategoryId = data[0].id;
                    }
                },
                handleFileSelect(e) { this.selectedFile = e.target.files[0]; },
                closeModal() {
                    this.showUploadModal = false;
                    this.selectedFile = null;
                    this.formData = { title: '', prompts: '', tags: '' };
                },
                async uploadAndSave() {
                    if (!this.selectedFile) return alert("请先上传一张图片哦！");
                    this.isUploading = true;
                    try {
                        const body = new FormData();
                        body.append('image', this.selectedFile);
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body });
                        const imgRes = await res.json();
                        
                        if (imgRes.success) {
                            const { error } = await supabaseClient.from('inspirations').insert([{
                                category_id: this.currentCategoryId,
                                image_url: imgRes.data.url,
                                title: this.formData.title,
                                prompts: this.formData.prompts,
                                tags: this.formData.tags
                            }]);
                            if (error) throw error;
                            await this.fetchInspirations();
                            this.closeModal();
                        } else throw new Error(imgRes.error.message);
                    } catch (e) {
                        alert("保存失败了 T_T 原因: " + e.message);
                    } finally { this.isUploading = false; }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
